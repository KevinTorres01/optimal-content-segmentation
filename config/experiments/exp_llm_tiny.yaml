experiment_id: exp_llm_tiny
description: "Prueba end-to-end de evaluación LLM (Mistral) en un dataset diminuto — pocas llamadas para no agotar la cuota gratuita"

dataset:
  path: data/tiny/
  split: all

algorithms:
  - name: dynamic_programming
    params:
      max_segments: 3

llm_evaluator:
  provider: mistral
  model: mistral-large-latest
  temperature: 0.0
  max_tokens: 512

evaluation:
  metrics: [windowdiff, pk, f1_boundary, llm_score, runtime_seconds]
  random_seed: 42

output:
  path: results/exp_llm_tiny/
  save_raw: true
