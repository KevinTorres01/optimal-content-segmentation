experiment_id: exp_auto_k
description: "Automatic k selection (elbow method) on Wikipedia — counterpart to exp_wikipedia with fixed k=5, measures the impact of choosing the number of segments per document instead of fixing it"

dataset:
  path: data/wikipedia/

algorithms:
  - name: dynamic_programming
    params:
      max_segments: auto
  - name: greedy
    params:
      max_segments: auto
      window_size: 2
  - name: simulated_annealing
    params:
      max_segments: auto
      n_iterations: 2000
      cooling_rate: 0.995
      random_seed: 42

llm_evaluator:
  provider: none

evaluation:
  metrics: [windowdiff, pk, f1_boundary, runtime_seconds]
  random_seed: 42

output:
  path: results/exp_auto_k/
  save_raw: true
