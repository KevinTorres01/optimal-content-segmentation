experiment_id: exp_llm_mistral
description: "DP en dataset small con evaluación de cohesión por Mistral (fallback a Ollama local si falla la conexión)"

dataset:
  path: data/small/
  split: all

algorithms:
  - name: dynamic_programming
    params:
      max_segments: 5

llm_evaluator:
  provider: mistral          # online primario, accesible desde Cuba
  model: mistral-large-latest
  temperature: 0.0
  max_tokens: 512

evaluation:
  metrics: [windowdiff, pk, f1_boundary, llm_score, runtime_seconds]
  random_seed: 42

output:
  path: results/exp_llm_mistral/
  save_raw: true
