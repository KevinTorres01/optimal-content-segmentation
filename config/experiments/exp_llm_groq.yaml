experiment_id: exp_llm_groq
description: "DP en dataset small con evaluación de cohesión por Groq (fallback a Mistral si Groq falla)"

dataset:
  path: data/small/

algorithms:
  - name: dynamic_programming
    params:
      max_segments: 5

llm_evaluator:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 512

evaluation:
  metrics: [windowdiff, pk, f1_boundary, llm_score, runtime_seconds]
  random_seed: 42

output:
  path: results/exp_llm_groq/
  save_raw: true
