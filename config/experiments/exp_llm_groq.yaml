experiment_id: exp_llm_groq
description: "DP, Greedy y SA en dataset small con evaluación de cohesión por Groq (fallback a Mistral)"

dataset:
  path: data/small/

algorithms:
  - name: dynamic_programming
    params:
      max_segments: 5
  - name: greedy
    params:
      max_segments: 5
      window_size: 2
  - name: simulated_annealing
    params:
      max_segments: 5
      n_iterations: 2000
      cooling_rate: 0.995
      random_seed: 42

llm_evaluator:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 512

evaluation:
  metrics: [windowdiff, pk, f1_boundary, llm_score, runtime_seconds]
  random_seed: 42

output:
  path: results/exp_llm_groq/
  save_raw: true
